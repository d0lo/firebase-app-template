name: Deploy Cloud Functions

# Keyless deploy via Workload Identity Federation. Bundles functions with esbuild, then
# deploys. Configured by repo variables WIF_PROVIDER, WIF_SERVICE_ACCOUNT, FIREBASE_PROJECT_ID.
# NOTE: Cloud Functions require the Blaze (pay-as-you-go) billing plan.
on:
  push:
    branches: [main]
    paths:
      - "firebase/functions/**"
      - "firebase/firebase.json"
      - ".github/workflows/firebase-functions-deploy.yml"
  workflow_dispatch:
    inputs:
      only:
        description: "firebase deploy --only target (e.g. functions:ping)"
        required: false
        default: "functions"

permissions:
  contents: read
  id-token: write

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Gate on WIF config
        id: cfg
        run: |
          if [ -z "${{ vars.WIF_PROVIDER }}" ]; then
            echo "Workload Identity not configured yet — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google (keyless)
        if: steps.cfg.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Install + bundle functions
        if: steps.cfg.outputs.skip != 'true'
        run: |
          npm ci
          npm --prefix firebase/functions ci
          npm --prefix firebase/functions run build

      - name: Deploy Cloud Functions
        if: steps.cfg.outputs.skip != 'true'
        run: |
          npx firebase deploy --only "${{ github.event.inputs.only || 'functions' }}" \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --config firebase/firebase.json --non-interactive
