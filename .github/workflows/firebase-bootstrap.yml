name: Firebase bootstrap

# ONE-SHOT project configuration, run by an agent (or you) after the project exists and
# the FIREBASE_SERVICE_ACCOUNT secret is set. Does everything that runs on the free Spark
# plan: enable APIs, create the Firestore database, deploy rules, enable anonymous auth,
# register a web app, and print the web config to copy into the VITE_FIREBASE_* secrets.
# The project id is derived from the key — nothing to type.
on:
  workflow_dispatch:
    inputs:
      region:
        description: "Firestore location (e.g. nam5, eur3, asia-east1)"
        default: "nam5"
        required: true

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve project id from the key
        run: |
          PID=$(node -e "console.log(require(process.env.GOOGLE_APPLICATION_CREDENTIALS).project_id)")
          echo "Project: $PID"
          echo "PROJECT_ID=$PID" >> "$GITHUB_ENV"

      - name: Enable required APIs
        run: |
          gcloud services enable firestore.googleapis.com identitytoolkit.googleapis.com \
            --project "$PROJECT_ID"

      - name: Create Firestore database (idempotent)
        run: |
          gcloud firestore databases create --location="${{ inputs.region }}" \
            --project "$PROJECT_ID" 2>&1 \
            || echo "Firestore DB already exists or was skipped — continuing."

      - run: npm ci

      - name: Deploy Firestore rules
        run: |
          npx firebase deploy --only firestore:rules \
            --project "$PROJECT_ID" --config firebase/firebase.json --non-interactive

      - name: Enable anonymous auth
        run: |
          TOKEN=$(gcloud auth print-access-token)
          curl -sS -X PATCH \
            "https://identitytoolkit.googleapis.com/admin/v2/projects/$PROJECT_ID/config?updateMask=signIn.anonymous.enabled" \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d '{"signIn":{"anonymous":{"enabled":true}}}'
          echo

      - name: Ensure a web app exists and print its config
        run: |
          APP_ID=$(npx firebase apps:list --project "$PROJECT_ID" --json 2>/dev/null \
            | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);const a=(j.result||[]).find(x=>x.platform==='WEB');process.stdout.write(a&&a.appId?a.appId:'')}catch(e){process.stdout.write('')}})")
          if [ -z "$APP_ID" ]; then
            echo "No web app yet — creating one."
            APP_ID=$(npx firebase apps:create WEB "Web app" --project "$PROJECT_ID" --json \
              | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(j.result&&j.result.appId?j.result.appId:'')}catch(e){process.stdout.write('')}})")
          fi
          echo "Web app id: $APP_ID"
          echo "::notice::Copy the values below into the VITE_FIREBASE_* repo secrets."
          echo "===FIREBASE_CONFIG_START==="
          npx firebase apps:sdkconfig WEB "$APP_ID" --project "$PROJECT_ID"
          echo "===FIREBASE_CONFIG_END==="
