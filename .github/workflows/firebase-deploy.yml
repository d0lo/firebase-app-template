name: Deploy Firestore rules

# Keyless deploy via Workload Identity Federation. Configured by repo variables
# WIF_PROVIDER, WIF_SERVICE_ACCOUNT, FIREBASE_PROJECT_ID. No-ops until they're set.
on:
  push:
    branches: [main]
    paths:
      - "firebase/firestore.rules"
      - "firebase/firestore.indexes.json"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy_rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Gate on WIF config
        id: cfg
        run: |
          if [ -z "${{ vars.WIF_PROVIDER }}" ]; then
            echo "Workload Identity not configured yet — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google (keyless)
        if: steps.cfg.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules
        if: steps.cfg.outputs.skip != 'true'
        run: |
          npm ci
          npx firebase deploy --only firestore:rules \
            --project "${{ vars.FIREBASE_PROJECT_ID }}" \
            --config firebase/firebase.json --non-interactive
