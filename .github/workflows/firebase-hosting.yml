name: Firebase Hosting

# Keyless deploy via Workload Identity Federation (no stored secret). Configured by repo
# *variables*: WIF_PROVIDER, WIF_SERVICE_ACCOUNT, FIREBASE_PROJECT_ID (+ optional VITE_FIREBASE_*
# if the app calls Firebase at runtime). Live on merge to main; preview channel on PRs.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation
  pull-requests: write

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Gate on WIF config
        id: cfg
        run: |
          if [ -z "${{ vars.WIF_PROVIDER }}" ]; then
            echo "Workload Identity not configured yet — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google (keyless)
        if: steps.cfg.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Build app
        if: steps.cfg.outputs.skip != 'true'
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci
          npm run build
          rm -rf firebase/public && cp -r app/dist firebase/public

      - name: Deploy (live on main, preview channel on PR)
        id: deploy
        if: steps.cfg.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npx firebase deploy --only hosting \
              --project "${{ vars.FIREBASE_PROJECT_ID }}" \
              --config firebase/firebase.json --non-interactive
          else
            OUT=$(npx firebase hosting:channel:deploy "pr-${{ github.event.number }}" --expires 7d \
              --project "${{ vars.FIREBASE_PROJECT_ID }}" \
              --config firebase/firebase.json --non-interactive --json)
            echo "$OUT"
            URL=$(echo "$OUT" | jq -r '[.result[].url][0] // empty')
            echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
          fi

      # Restore the PR-surfacing behaviour of FirebaseExtended/action-hosting-deploy without
      # reintroducing a stored service-account key — we deploy keyless via the CLI above and
      # surface the channel URL here, both as a sticky comment and as a banner at the top of the
      # PR body. Both are marker-based (find-or-update) so they refresh in place on every push
      # and the body edit only ever touches its own region, never the author's description.
      - name: Surface preview URL on PR (comment + body banner)
        if: steps.cfg.outputs.skip != 'true' && github.event_name == 'pull_request' && steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // 1) Sticky comment (find-or-update by marker).
            const cMarker = '<!-- firebase-preview -->';
            const cBody = `${cMarker}\n### 🔗 Firebase preview\n\n**${url}**\n\nDeployed from \`${sha}\` · expires in 7 days · updates on every push to this PR.`;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body.includes(cMarker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: cBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: cBody });
            }

            // 2) Banner in a marked region at the top of the PR body (updated in place; the rest
            //    of the description is left untouched).
            const start = '<!-- firebase-preview-body -->';
            const end = '<!-- /firebase-preview-body -->';
            const banner = `${start}\n> ### 🔗 Firebase preview — **${url}**\n> Deployed from \`${sha}\` · refreshes on every push · expires 7 days after the last.\n${end}`;
            let prBody = context.payload.pull_request.body || '';
            const region = new RegExp(`${start}[\\s\\S]*?${end}`);
            prBody = region.test(prBody) ? prBody.replace(region, banner) : `${banner}\n\n${prBody}`;
            await github.rest.pulls.update({ owner, repo, pull_number: issue_number, body: prBody });
